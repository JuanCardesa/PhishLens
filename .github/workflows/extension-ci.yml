name: Extension CI

on:
  push:
    paths:
      - "extension/**"
      - ".github/workflows/extension-ci.yml"
  pull_request:
    branches:
      - develop
      - main

jobs:
  extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: extension/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run lint
      - name: Unit tests
        run: npm run test
      - name: Build
        run: npm run build
      - name: Package
        run: npm run package

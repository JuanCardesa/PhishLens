<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PhishLens Demo - Suspicious Page</title>
    <style>
      body {
        max-width: 760px;
        margin: 48px auto;
        padding: 0 20px;
        color: #172033;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
      }
      form,
      section {
        margin-top: 20px;
        padding: 16px;
        border: 1px solid #d7dde8;
        border-radius: 8px;
      }
      label {
        display: grid;
        gap: 6px;
        margin-bottom: 12px;
      }
      input {
        min-height: 36px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Suspicious Demo Page</h1>
      <p>This page uses a login-style form and several external links, but it is still only a local demo fixture.</p>
      <form action="/pages/suspicious.html" method="post">
        <label>
          Account ID
          <input name="account" autocomplete="off" />
        </label>
        <button type="button">Continue</button>
      </form>
      <section>
        <a href="https://example.com/help">External help</a>
        <a href="https://example.org/status">External status</a>
        <a href="/pages/safe.html">Internal safety page</a>
      </section>
      <iframe title="demo frame" src="/pages/safe.html"></iframe>
    </main>
  </body>
</html>

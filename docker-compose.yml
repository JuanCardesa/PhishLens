services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      PHISHTANK_API_KEY: ${PHISHTANK_API_KEY:-}
      PHISHTANK_USER_AGENT: ${PHISHTANK_USER_AGENT:-phishtank/phishlens-demo}
      PHISHLENS_ALLOWED_ORIGINS: ${PHISHLENS_ALLOWED_ORIGINS:-http://localhost:5173}
      PHISHLENS_ENABLE_THREAT_INTEL: ${PHISHLENS_ENABLE_THREAT_INTEL:-true}
      PHISHLENS_ENABLE_TLS_ANALYSIS: ${PHISHLENS_ENABLE_TLS_ANALYSIS:-true}
      PHISHLENS_ENABLE_DIAGNOSTICS: ${PHISHLENS_ENABLE_DIAGNOSTICS:-true}
      PHISHLENS_ENABLE_RATE_LIMITING: ${PHISHLENS_ENABLE_RATE_LIMITING:-true}
      PHISHLENS_ANALYZE_RATE_LIMIT: ${PHISHLENS_ANALYZE_RATE_LIMIT:-60}
      PHISHLENS_REPORT_RATE_LIMIT: ${PHISHLENS_REPORT_RATE_LIMIT:-20}
      PHISHLENS_RATE_LIMIT_WINDOW_SECONDS: ${PHISHLENS_RATE_LIMIT_WINDOW_SECONDS:-60}
      PHISHLENS_ENABLE_DEMO_THREAT_SOURCE: ${PHISHLENS_ENABLE_DEMO_THREAT_SOURCE:-false}

  # redis:
